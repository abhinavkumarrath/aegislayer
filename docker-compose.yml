version: '3.8'

services:
  aegislayer:
    build: .
    ports:
      - "8000:8000"
    
    # ── AMD ROCm Hardware Acceleration Configuration ──
    # Expose the AMD kernel fusion driver and direct rendering infrastructure
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    security_opt:
      - seccomp:unconfined
    group_add:
      - video
      
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./.env:/app/backend/.env:ro
