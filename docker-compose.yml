version: '3.8'

services:
  aegislayer:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Defaults for the AMD Hackathon or general deployments
      - LOG_LEVEL=INFO
      - NER_MODEL=dslim/bert-base-NER
      - NER_SCORE_THRESHOLD=0.75
      # Optional external LLM configuration 
      # - LLM_API_KEY=your_groq_api_key_here
      # - LLM_BASE_URL=https://api.groq.com/openai/v1
      # - LLM_MODEL=llama-3.3-70b-versatile
    restart: unless-stopped
    volumes:
      # Optional: Mount .env if you prefer keeping secrets in a local file
      - ./.env:/app/backend/.env:ro
